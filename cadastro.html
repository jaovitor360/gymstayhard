<!DOCTYPE html>
<html lang="en">
<head>
<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro | GYM Stay Hard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="CSS/cadastro.css">

</head>

<body>

<main class="container">

<section class="cadastro-box">
    <a href="index.html" class="voltar">

    <i class="fa-solid fa-arrow-left"></i>


</a>

<a href="index.html" class="logo">

<img src="img/logo.png" alt="Logo">

<h2>GYM <span>Stay Hard</span></h2>

</a>

<h1>Crie sua conta</h1>

<p>Preencha seus dados para começar.</p>

<form>

<div class="grid">

<div class="input-box">

<label>Nome</label>

<input type="text" required minlength="3">

</div>

<div class="input-box">

<label>Sobrenome</label>

<input type="text" required minlength="3">

</div>

<div class="input-box">

<label>E-mail</label>

<input type="email" required>

</div>

<div class="input-box">

<label>Telefone</label>

<input type="tel" placeholder="(99) 99999-9999" required>

</div>

<div class="input-box">

<label>Data de nascimento</label>

<input type="date" required>

</div>

<div class="input-box">

<label>Sexo</label>

<select required>

<option value="">Selecione</option>

<option>Masculino</option>

<option>Feminino</option>

<option>Outro</option>

</select>

</div>

<div class="input-box">

<label>Peso (kg)</label>

<input type="number" min="30" max="300" required>

</div>

<div class="input-box">

<label>Altura (cm)</label>

<input type="number" min="100" max="250" required>

</div>

<div class="input-box">

<label>Objetivo</label>

<select required>

<option value="">Selecione</option>

<option>Hipertrofia</option>

<option>Emagrecimento</option>

<option>Definição</option>

<option>Condicionamento</option>

</select>

</div>

<div class="input-box">

<label>Senha</label>

<input type="password" minlength="6" required>

</div>

<div class="input-box">

<label>Confirmar Senha</label>

<input type="password" minlength="6" required>

</div>

</div>

<div class="checkbox">

<label>

<input type="checkbox" required>

Aceito os termos de uso.

</label>

</div>

<button type="submit">

Criar Conta

</button>

</form>

<p class="login">

Já possui conta?

<a href="login.html">Entrar</a>

</p>

</section>

</main>

</body>

</html>
</head>
